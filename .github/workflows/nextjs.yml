name: Daily rebuild

on:
  schedule:
    # Trigger a fresh Vercel deploy every day at 7 AM UTC so scraped event data stays current.
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
